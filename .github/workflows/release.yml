name: Release Desktop Build

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify
        run: |
          deno task check
          deno task lint

      - name: Build desktop app
        run: deno task desktop:build

      - name: Package Windows app
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist-desktop\DenoDesktopTldraw\* `
            -DestinationPath DenoDesktopTldraw-windows-x64.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: DenoDesktopTldraw-windows-x64.zip
          generate_release_notes: true
